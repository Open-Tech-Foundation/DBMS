name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: build · test · clippy · fmt · doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace --all-targets --locked
      - name: test
        run: cargo test --workspace --locked
      - name: doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  loom:
    name: loom concurrency model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The registry's writer/reader handoff is proved by a `loom` model, built
      # only under `--cfg loom`. Run it in CI so the concurrency proof can't rot.
      - name: loom model check
        run: cargo test -p txn --test loom_registry --release --locked
        env:
          RUSTFLAGS: --cfg loom -D warnings

  # Benches must always *compile* (the `build --all-targets` step above covers
  # that), but they only *run* on demand — shared CI runners are too noisy for
  # trustworthy timings. Trigger this job manually from the Actions tab.
  bench:
    name: benchmarks (on demand)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run criterion suite
        run: cargo bench -p otf-edb --bench engine -- --output-format bencher | tee bench-results.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.txt

  supply-chain:
    name: audit · deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit,cargo-deny
      - name: cargo audit
        run: cargo audit
      - name: cargo deny
        run: cargo deny check
